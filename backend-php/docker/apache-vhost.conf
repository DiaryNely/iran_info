<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/html/public

    <Directory /var/www/html/public>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType text/css "access plus 30 days"
        ExpiresByType application/javascript "access plus 30 days"
        ExpiresByType image/jpeg "access plus 180 days"
        ExpiresByType image/png "access plus 180 days"
        ExpiresByType image/webp "access plus 180 days"
        ExpiresByType image/svg+xml "access plus 30 days"
        ExpiresByType font/woff2 "access plus 180 days"
    </IfModule>

    <IfModule mod_headers.c>
        <FilesMatch "\.(css|js)$">
            Header set Cache-Control "public, max-age=2592000, immutable"
        </FilesMatch>
        <FilesMatch "\.(png|jpg|jpeg|webp|svg|woff2)$">
            Header set Cache-Control "public, max-age=15552000, immutable"
        </FilesMatch>
    </IfModule>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
