services:
  db:
    image: postgres:16-alpine
    container_name: iran-info-db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: iran-info-backend
    env_file:
      - ./.env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-86400}
      UPLOADS_DIR: /app/uploads/articles
      CORS_ORIGIN: "http://localhost:${FRONTOFFICE_PORT},http://localhost:${BACKOFFICE_PORT:-5174}"
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./backend-java/uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  backend-php:
    build:
      context: ./backend-php
      dockerfile: Dockerfile
    container_name: iran-info-backend-php
    environment:
      APP_ENV: local
      APP_DEBUG: 1
      APP_BASE_URL: http://localhost:${PHP_BACKEND_PORT:-8081}
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${PHP_BACKEND_PORT:-8081}:80"
    volumes:
      - ./backend-php:/var/www/html
    depends_on:
      - db
    restart: unless-stopped

volumes:
  postgres_data:
