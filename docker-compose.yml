services:
  db:
    image: postgres:16-alpine
    container_name: iran-info-db
    env_file:
      - ./.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
    restart: unless-stopped

  backend:
    build:
      context: ./backend-java
      dockerfile: Dockerfile
    container_name: iran-info-backend
    env_file:
      - ./.env
    environment:
      DATABASE_HOST: db
      DATABASE_PORT: 5432
      DATABASE_USER: ${POSTGRES_USER}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      DATABASE_NAME: ${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN_SECONDS: ${JWT_EXPIRES_IN_SECONDS:-86400}
      UPLOADS_DIR: /app/uploads/articles
      CORS_ORIGIN: "http://localhost:${FRONTOFFICE_PORT},http://localhost:${BACKOFFICE_PORT:-5174}"
    ports:
      - "${BACKEND_PORT}:8080"
    volumes:
      - ./backend-java/uploads:/app/uploads
    depends_on:
      - db
    restart: unless-stopped

  frontoffice:
    build:
      context: ./frontoffice
      dockerfile: Dockerfile
    container_name: iran-info-frontoffice
    env_file:
      - ./.env
    environment:
      VITE_API_BASE_URL: http://localhost:${BACKEND_PORT}/api
    ports:
      - "${FRONTOFFICE_PORT}:5173"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
